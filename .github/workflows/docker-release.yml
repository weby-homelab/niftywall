name: Docker Release 🛡️

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set version
        id: vars
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            webyhomelab/niftywall:${{ steps.vars.outputs.VERSION }}
            webyhomelab/niftywall:Stable
            webyhomelab/niftywall:latest

      - name: Update Docker Hub Overview
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username": "webyhomelab", "password": "${{ secrets.DOCKER_HUB_TOKEN }}"}' https://hub.docker.com/v2/users/login/ | jq -r .token)
          OVERVIEW=$(cat README.md && echo -e "\n---\n" && cat README_ENG.md)
          curl -s -X PATCH -H "Content-Type: application/json" -H "Authorization: JWT ${TOKEN}" \
            -d "{\"full_description\": $(echo "$OVERVIEW" | jq -R -s .)}" \
            https://hub.docker.com/v2/repositories/webyhomelab/niftywall/
