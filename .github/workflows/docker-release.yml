name: Docker Release 🛡️

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set version
        id: vars
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            webyhomelab/niftywall:${{ steps.vars.outputs.VERSION }}
            webyhomelab/niftywall:Stable
            webyhomelab/niftywall:latest

      - name: Update Docker Hub Overview
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username": "webyhomelab", "password": "${{ secrets.DOCKER_HUB_TOKEN }}"}' https://hub.docker.com/v2/users/login/ | jq -r .token)
          
          # 1. Очищуємо контент від HTML перемикачів та бейджів для Docker Hub
          # Видаляємо всі <p align="center"> блоки до першого H1 заголовоку
          EN_CLEAN=$(sed '1,/# /d' README_ENG.md | sed '0,/# /s//# /')
          UA_CLEAN=$(sed '1,/# /d' README.md | sed '0,/# /s//# /')
          
          # 2. Формуємо навігацію з абсолютними посиланнями на GitHub
          NAV="[English 🇬🇧](https://github.com/weby-homelab/niftywall/blob/main/README_ENG.md) | [Українська 🇺🇦](https://github.com/weby-homelab/niftywall/blob/main/README.md)\n\n---\n"
          
          # 3. Збираємо фінальний опис: EN перша, UA друга
          OVERVIEW=$(echo -e "${NAV}\n${EN_CLEAN}\n\n---\n\n${UA_CLEAN}\n\n---\nMade with ❤️ in Kyiv\n✦ 2026 Weby Homelab ✦")
          
          # 4. Пушимо оновлений опис
          curl -s -X PATCH -H "Content-Type: application/json" -H "Authorization: JWT ${TOKEN}" \
            -d "{\"full_description\": $(echo "$OVERVIEW" | jq -R -s .)}" \
            https://hub.docker.com/v2/repositories/webyhomelab/niftywall/
