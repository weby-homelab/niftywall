name: Release 🚀

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create_release.outputs.release_id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION}"

      - name: Generate release notes
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "Generating full changelog from initial commit..."
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "Generating changelog from ${PREV_TAG}..."
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${GITHUB_REF_NAME}" --no-merges)
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changes since last release."
          fi

          printf '%s\n' "$CHANGELOG" > /tmp/changelog.txt
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cat /tmp/changelog.txt > CHANGELOG.md
          cat CHANGELOG.md
        shell: bash

      - name: Create GitHub Release
        id: create_release
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            let changelog = '';
            try {
              changelog = fs.readFileSync('/tmp/changelog.txt', 'utf-8');
            } catch (e) {
              changelog = 'No changes.';
            }

            const tagName = process.env.VERSION;
            const releaseName = `Release ${tagName}`;
            const isPrerelease = tagName.includes('beta') || tagName.includes('rc') || tagName.includes('alpha');

            console.log(`Creating release: ${releaseName}`);
            console.log(`Tag: v${tagName}`);
            console.log(`Prerelease: ${isPrerelease}`);

            const result = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${tagName}`,
              name: releaseName,
              body: changelog,
              draft: false,
              prerelease: isPrerelease,
              generate_release_notes: false
            });

            core.setOutput('release_id', result.data.id);
            core.setOutput('upload_url', result.data.upload_url);

            console.log(`Release created successfully: ${result.data.html_url}`);

      - name: Upload Release Assets
        if: steps.create_release.outputs.release_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp CHANGELOG.md "CHANGELOG-${{ steps.version.outputs.VERSION }}.md"
          gh release upload "v${{ steps.version.outputs.VERSION }}" CHANGELOG.md "CHANGELOG-${{ steps.version.outputs.VERSION }}.md" VERSION

      - name: Mark as latest release
        if: steps.create_release.outputs.release_id != ''
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ steps.create_release.outputs.release_id }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = parseInt(process.env.RELEASE_ID, 10);
            const version = process.env.VERSION;
            const isPrerelease = version.includes('beta') || version.includes('rc') || version.includes('alpha');

            if (isPrerelease) {
              console.log(`Current release (v${version}) is a prerelease. Finding latest non-prerelease to mark as latest.`);

              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10
              });

              const stableReleases = releases.filter(r => !r.prerelease && !r.draft);
              if (stableReleases.length > 0) {
                const latest = stableReleases[0];
                console.log(`Marking ${latest.tag_name} as latest release.`);
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: latest.id,
                  make_latest: 'true'
                });
              } else {
                console.log('No stable (non-prerelease, non-draft) releases found.');
              }
            } else {
              console.log(`Current release (v${version}) is a stable release. Marking as latest.`);
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                make_latest: 'true'
              });
            }
