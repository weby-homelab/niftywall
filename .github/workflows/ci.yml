name: CI 🧪

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff mypy

      - name: Run pytest with verbose output
        run: |
          pytest tests/ -v --tb=short --color=yes

      - name: Run pytest with coverage report
        run: |
          pytest tests/ --cov=app --cov-report=term-missing --cov-report=xml -v
        continue-on-error: true

      - name: Run ruff lint
        run: |
          ruff check app/ tests/ || echo "Ruff found linting issues (non-fatal)"
        continue-on-error: true

      - name: Run mypy type check (basic)
        run: |
          mypy app/ --ignore-missing-imports --no-error-summary || echo "Mypy found type issues (non-fatal)"
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            pytest-results.xml
            coverage.xml
          retention-days: 14
          if-no-files-found: ignore
