<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiftyWall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            800: '#1f2937',
                            900: '#111827',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(31, 41, 55, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tab-active {
            border-bottom: 2px solid #10b981;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white flex items-center gap-2">
                    <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    NiftyWall
                </h1>
                <p class="text-gray-400 mt-1">Smart Linux Firewall Management</p>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="panicMode()" class="px-4 py-2 bg-red-600/20 hover:bg-red-600/40 border border-red-500/50 text-red-400 rounded-md transition-colors text-sm font-bold flex items-center gap-2" title="Block all incoming traffic except SSH and Tailscale">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    Panic Mode
                </button>
                <div class="h-6 w-px bg-gray-700 mx-2"></div>
                <button onclick="refreshData()" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-600 rounded-md transition-colors text-sm font-medium text-gray-300">
                    Refresh
                </button>
                <button onclick="backupRules()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-md transition-colors text-sm font-medium text-white shadow-[0_0_10px_rgba(16,185,129,0.2)]">
                    Backup Rules
                </button>
                <button onclick="window.location.href='/logout'" class="px-4 py-2 bg-gray-800/80 hover:bg-red-900/40 border border-gray-700 hover:border-red-500/50 text-gray-400 hover:text-red-400 rounded-md transition-all text-sm font-medium">
                    Logout
                </button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <div class="flex gap-8 border-b border-gray-700 mb-8">
            <button onclick="switchTab('rules')" id="tab-rules" class="pb-4 px-2 text-sm font-medium text-gray-400 hover:text-white transition-all tab-active">Firewall Rules</button>
            <button onclick="switchTab('nat')" id="tab-nat" class="pb-4 px-2 text-sm font-medium text-gray-400 hover:text-white transition-all">Port Forwarding</button>
            <button onclick="switchTab('sets')" id="tab-sets" class="pb-4 px-2 text-sm font-medium text-gray-400 hover:text-white transition-all">Dynamic Sets</button>
            <button onclick="switchTab('audit')" id="tab-audit" class="pb-4 px-2 text-sm font-medium text-gray-400 hover:text-white transition-all">Audit Log</button>
        </div>

        <div id="loading" class="text-center py-12 text-gray-400 hidden">
            <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-emerald-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Processing...
        </div>

        <div id="error" class="hidden glass border-red-500/50 text-red-400 p-4 rounded-lg mb-8 flex justify-between items-center">
            <span id="error-msg"></span>
            <button onclick="this.parentElement.classList.add('hidden')" class="text-red-400 hover:text-red-300">&times;</button>
        </div>
        <div id="success" class="hidden glass border-emerald-500/50 text-emerald-400 p-4 rounded-lg mb-8 flex justify-between items-center">
            <span id="success-msg"></span>
            <button onclick="this.parentElement.classList.add('hidden')" class="text-emerald-400 hover:text-emerald-300">&times;</button>
        </div>

        <!-- Rules Tab -->
        <section id="content-rules" class="space-y-8">
            <!-- Rule Builder Button -->
            <div class="flex justify-end mb-4">
                <button onclick="openRuleModal()" class="px-6 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-md text-sm font-bold shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    Build New Rule
                </button>
            </div>

            <div id="rules-container" class="space-y-8"></div>
        </section>

        <!-- Rule Builder Modal -->
        <div id="rule-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-50">
            <div class="glass p-6 rounded-xl w-full max-w-lg border border-gray-600 shadow-2xl relative">
                <button onclick="closeRuleModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white">&times;</button>
                <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    Advanced Rule Builder
                </h2>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Table Family</label>
                            <select id="rule-family" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                                <option value="inet">inet (IPv4/IPv6)</option>
                                <option value="ip">ip (IPv4 only)</option>
                                <option value="ip6">ip6 (IPv6 only)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Chain</label>
                            <select id="rule-chain" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                                <option value="input">input (Incoming)</option>
                                <option value="forward">forward (Routing)</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Protocol</label>
                            <select id="rule-protocol" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                                <option value="tcp">TCP</option>
                                <option value="udp">UDP</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Port(s) <span class="text-gray-500">- e.g. 80,443</span></label>
                            <input type="text" id="rule-ports" placeholder="80" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Source IP / Set <span class="text-gray-500">- e.g. any, 192.168.1.5, @whitelist</span></label>
                        <input type="text" id="rule-source" value="any" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Action</label>
                        <select id="rule-action" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                            <option value="accept" class="text-emerald-400 font-bold">Accept</option>
                            <option value="drop" class="text-red-400 font-bold">Drop</option>
                        </select>
                    </div>

                    <div class="border border-gray-700 rounded-lg p-4 bg-gray-800/50 mt-4">
                        <label class="flex items-center gap-2 cursor-pointer mb-3">
                            <input type="checkbox" id="rule-rate-enabled" onchange="toggleRateLimit()" class="w-4 h-4 text-emerald-500 rounded bg-gray-900 border-gray-600">
                            <span class="text-sm font-bold text-white flex items-center gap-2">🛡️ Enable Anti-DDoS (Rate Limiting)</span>
                        </label>
                        
                        <div id="rate-limit-settings" class="hidden grid grid-cols-3 gap-3">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">Rate</label>
                                <input type="number" id="rule-rate" value="30" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm text-white">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">Per</label>
                                <select id="rule-unit" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm text-white">
                                    <option value="second">Second</option>
                                    <option value="minute">Minute</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">Burst</label>
                                <input type="number" id="rule-burst" value="50" class="w-full bg-gray-900 border border-gray-600 rounded px-2 py-1 text-sm text-white">
                            </div>
                        </div>
                    </div>

                    <button onclick="submitAdvancedRule()" class="w-full mt-4 px-4 py-3 bg-emerald-600 hover:bg-emerald-500 text-white rounded-md text-sm font-bold transition-colors">
                        Apply Rule
                    </button>
                </div>
            </div>
        </div>

        <!-- NAT Tab -->
        <section id="content-nat" class="hidden space-y-8">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 class="text-xl font-semibold text-white">Destination NAT (DNAT)</h2>
                    <p class="text-xs text-gray-500">Forward external ports to internal IPs (e.g. Docker containers)</p>
                </div>
                <button onclick="openNatModal()" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-md text-sm font-bold shadow-[0_0_15px_rgba(79,70,229,0.3)] transition-all flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    New NAT Rule
                </button>
            </div>
            <div id="nat-container" class="space-y-8"></div>
        </section>

        <!-- NAT Builder Modal -->
        <div id="nat-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-50">
            <div class="glass p-6 rounded-xl w-full max-w-lg border border-gray-600 shadow-2xl relative">
                <button onclick="closeNatModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white">&times;</button>
                <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    Create Port Forwarding
                </h2>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Protocol</label>
                            <select id="nat-protocol" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                                <option value="tcp">TCP</option>
                                <option value="udp">UDP</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">External Port</label>
                            <input type="number" id="nat-ext-port" placeholder="8080" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                        </div>
                    </div>

                    <div class="p-4 bg-gray-800/50 border border-gray-700 rounded-lg text-center">
                        <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Forward To ➔</span>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="col-span-2">
                            <label class="block text-xs text-gray-400 mb-1">Internal IP</label>
                            <input type="text" id="nat-int-ip" placeholder="172.17.0.2" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Internal Port (opt)</label>
                            <input type="number" id="nat-int-port" placeholder="80" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-2 text-sm text-white">
                        </div>
                    </div>

                    <button onclick="submitNatRule()" class="w-full mt-4 px-4 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-md text-sm font-bold transition-colors">
                        Apply NAT Rule
                    </button>
                </div>
            </div>
        </div>

        <!-- Sets Tab -->
        <section id="content-sets" class="hidden space-y-8">
            <div id="sets-container" class="space-y-8"></div>
        </section>

        <!-- Audit Tab -->
        <section id="content-audit" class="hidden">
            <div class="glass p-8 text-center rounded-xl text-gray-400">Audit log will be implemented in the next step.</div>
        </section>

        <footer class="mt-12 text-center text-sm text-gray-500 pb-8">
            © 2026 Weby Homelab. Running locally.
        </footer>
    </div>

    <script>
        let currentTab = 'rules';
        const geoCache = new Map();
        const statsHistory = new Map(); // handle -> [pkts1, pkts2, ...]
        const charts = new Map(); // handle -> chartInstance

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('header + div button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            
            refreshData();
        }

        async function refreshData() {
            if (currentTab === 'rules' || currentTab === 'nat') fetchRules();
            if (currentTab === 'sets') fetchSets();
            if (currentTab === 'audit') fetchAudit();
        }

        async function fetchAudit() {
            setLoading(true);
            try {
                const res = await fetch('/api/audit');
                if (!res.ok) throw new Error('Failed to fetch audit log');
                const data = await res.json();
                renderAudit(data);
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        }

        function renderAudit(logs) {
            const container = document.getElementById('content-audit');
            if (logs.length === 0) {
                container.innerHTML = '<div class="glass p-8 text-center rounded-xl text-gray-400">No actions recorded yet.</div>';
                return;
            }

            let html = `
                <div class="glass rounded-xl overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead class="text-xs text-gray-400 uppercase bg-gray-800/50 border-b border-gray-700">
                            <tr>
                                <th class="px-6 py-3">Time</th>
                                <th class="px-6 py-3">User</th>
                                <th class="px-6 py-3">Action</th>
                                <th class="px-6 py-3">Details</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            logs.forEach(log => {
                const date = new Date(log.timestamp).toLocaleString();
                const actionClass = log.action.includes('DELETE') || log.action === 'PANIC_MODE' ? 'text-red-400' : 'text-emerald-400';
                html += `
                    <tr class="border-b border-gray-700/50 last:border-0 hover:bg-white/5 transition-colors">
                        <td class="px-6 py-4 text-gray-400 font-mono text-xs">${date}</td>
                        <td class="px-6 py-4 font-medium">${log.user}</td>
                        <td class="px-6 py-4"><span class="px-2 py-1 rounded bg-gray-900 text-xs font-bold ${actionClass}">${log.action}</span></td>
                        <td class="px-6 py-4 text-gray-300 text-xs">${log.details}</td>
                    </tr>
                `;
            });

            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        async function fetchRules() {
            // Only show loader on initial load
            if (statsHistory.size === 0) setLoading(true);
            
            try {
                const res = await fetch('/api/ruleset');
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to fetch rules');
                }
                const data = await res.json();
                renderRules(data);
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        }

        async function getGeo(ip) {
            if (!ip || ip.includes('/') || ip.includes('*') || ip === '127.0.0.1' || ip.startsWith('100.')) return null;
            if (geoCache.has(ip)) return geoCache.get(ip);
            try {
                const res = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await res.json();
                if (data.country_name) {
                    const info = { country: data.country_name, code: data.country_code.toLowerCase(), city: data.city };
                    geoCache.set(ip, info);
                    return info;
                }
            } catch (e) { geoCache.set(ip, null); }
            return null;
        }

        function updateSparkline(handle, currentPkts) {
            if (!statsHistory.has(handle)) statsHistory.set(handle, []);
            const history = statsHistory.get(handle);
            
            // We want to graph the DELTA (packets per interval)
            let delta = 0;
            if (history.length > 0) {
                const lastTotal = history[history.length - 1].total;
                delta = Math.max(0, currentPkts - lastTotal);
            }
            
            history.push({ total: currentPkts, delta: delta });
            if (history.length > 20) history.shift();

            const canvas = document.getElementById(`chart-${handle}`);
            if (!canvas) return;

            if (charts.has(handle)) {
                const chart = charts.get(handle);
                chart.data.datasets[0].data = history.map(h => h.delta);
                chart.update('none');
            } else {
                const ctx = canvas.getContext('2d');
                const chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: history.map((_, i) => i),
                        datasets: [{
                            data: history.map(h => h.delta),
                            borderColor: '#10b981',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'rgba(16, 185, 129, 0.1)'
                        }]
                    },
                    options: {
                        responsive: false,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { enabled: false } },
                        scales: { x: { display: false }, y: { display: false, min: 0 } }
                    }
                });
                charts.set(handle, chart);
            }
        }

        function formatExpr(exprArray) {
            if (!exprArray) return '<span class="text-gray-500 italic">Empty rule</span>';
            let parts = [];
            
            exprArray.forEach(e => {
                if (e.match) {
                    let left = JSON.stringify(e.match.left).replace(/[{"}]/g, '');
                    let right = JSON.stringify(e.match.right).replace(/[{"}]/g, '').replace(/set:\[/g, '{ ').replace(/\]/g, ' }');
                    
                    // Humanize 'left' side (the property being matched)
                    left = left.replace('payload:protocol:tcp,field:dport', 'TCP Port')
                               .replace('payload:protocol:udp,field:dport', 'UDP Port')
                               .replace('payload:protocol:ip,field:saddr', 'IPv4 Source')
                               .replace('payload:protocol:ip6,field:saddr', 'IPv6 Source')
                               .replace('payload:protocol:ip,field:daddr', 'IPv4 Dest')
                               .replace('payload:protocol:ip6,field:daddr', 'IPv6 Dest')
                               .replace('meta:key:iifname', 'In-Interface')
                               .replace('meta:key:oifname', 'Out-Interface')
                               .replace('meta:key:iif', 'In-IF (idx)')
                               .replace('ct:key:state', 'Conn State')
                               .replace('payload:protocol:ip,field:protocol', 'IP Protocol');
                               
                    // Humanize operators
                    let op = e.match.op === '==' ? '=' : e.match.op;
                    
                    parts.push(`<div class="bg-gray-800/80 px-2 py-1 rounded border border-gray-700/50 inline-block whitespace-nowrap"><span class="text-blue-400 font-medium">${left}</span> <span class="text-gray-500 mx-1">${op}</span> <span class="text-yellow-400 font-medium">${right}</span></div>`);
                } else if (e.limit) {
                    parts.push(`<div class="bg-purple-900/30 border border-purple-500/30 px-2 py-1 rounded inline-block whitespace-nowrap text-purple-300"><span class="font-bold">Limit:</span> ${e.limit.rate}/${e.limit.per} <span class="text-purple-400/70 text-[10px]">(burst ${e.limit.burst})</span></div>`);
                } else if (e.accept) {
                    parts.push('<span class="bg-emerald-500/20 border border-emerald-500/30 text-emerald-400 px-2 py-1 rounded font-bold uppercase text-[10px] tracking-wider shadow-[0_0_8px_rgba(16,185,129,0.15)]">Accept</span>');
                } else if (e.drop) {
                    parts.push('<span class="bg-red-500/20 border border-red-500/30 text-red-400 px-2 py-1 rounded font-bold uppercase text-[10px] tracking-wider shadow-[0_0_8px_rgba(239,68,68,0.15)]">Drop</span>');
                } else if (e.return) {
                    parts.push('<span class="bg-blue-500/20 border border-blue-500/30 text-blue-400 px-2 py-1 rounded font-bold uppercase text-[10px] tracking-wider">Return</span>');
                } else if (e.jump) {
                    const target = e.jump.target || 'unknown';
                    parts.push(`<div class="bg-indigo-900/30 border border-indigo-500/30 px-2 py-1 rounded inline-block whitespace-nowrap text-indigo-300"><span class="font-bold text-[10px] uppercase">Jump ➔</span> ${target}</div>`);
                } else if (e.dnat) {
                    parts.push(`<div class="bg-orange-900/30 border border-orange-500/30 px-2 py-1 rounded inline-block whitespace-nowrap text-orange-300"><span class="font-bold text-[10px] uppercase">DNAT ➔</span> ${e.dnat}</div>`);
                } else if (e.snat) {
                    parts.push(`<div class="bg-orange-900/30 border border-orange-500/30 px-2 py-1 rounded inline-block whitespace-nowrap text-orange-300"><span class="font-bold text-[10px] uppercase">SNAT ➔</span> ${e.snat}</div>`);
                } else if (e.masquerade !== undefined) {
                    parts.push('<span class="bg-orange-500/20 border border-orange-500/30 text-orange-400 px-2 py-1 rounded font-bold uppercase text-[10px] tracking-wider shadow-[0_0_8px_rgba(249,115,22,0.15)]">Masquerade</span>');
                } else if (e.xt) {
                    parts.push(`<span class="text-gray-400 text-xs italic">[xtables compatibility]</span>`);
                } else if (e.counter) {
                    // Handled in a separate column
                } else if (e.log) {
                    const prefix = e.log.prefix || '';
                    parts.push(`<span class="bg-gray-700 text-gray-300 px-2 py-1 rounded font-mono text-xs">📝 Log (${prefix})</span>`);
                } else {
                    const key = Object.keys(e)[0];
                    parts.push(`<span class="text-gray-500 text-xs">[${key}]</span>`);
                }
            });
            
            return parts.join(' ');
        }

        function renderRules(data) {
            const rulesContainer = document.getElementById('rules-container');
            const natContainer = document.getElementById('nat-container');
            
            const tables = data.nftables.filter(item => item.table);
            const chains = data.nftables.filter(item => item.chain);
            const rules = data.nftables.filter(item => item.rule);

            const currentRuleHandles = rules.map(r => r.rule.handle).join(',');
            const oldRuleHandles = Array.from(document.querySelectorAll('[data-handle]')).map(el => el.dataset.handle).join(',');
            
            if (currentRuleHandles !== oldRuleHandles) {
                rulesContainer.innerHTML = '';
                if(natContainer) natContainer.innerHTML = '';
                charts.forEach(c => c.destroy());
                charts.clear();
            }

            tables.forEach(tObj => {
                const t = tObj.table;
                const isNat = t.name.includes('nat');
                const targetContainer = isNat && natContainer ? natContainer : rulesContainer;
                
                let section = document.getElementById(`table-section-${t.family}-${t.name}`);
                
                if (!section) {
                    section = document.createElement('div');
                    section.id = `table-section-${t.family}-${t.name}`;
                    section.className = 'glass rounded-xl overflow-hidden mb-8';
                    targetContainer.appendChild(section);
                }

                let html = `<div class="bg-gray-800/80 px-6 py-4 border-b border-gray-700 flex justify-between items-center"><h2 class="text-xl font-semibold text-white flex items-center gap-2"><span class="text-xs font-mono bg-gray-700 px-2 py-1 rounded text-gray-300">${t.family}</span> Table: ${t.name}</h2></div><div class="p-6 space-y-6">`;

                chains.filter(c => c.chain.table === t.name && c.chain.family === t.family).forEach(cObj => {
                    const c = cObj.chain;
                    const chainRules = rules.filter(r => r.rule.table === t.name && r.rule.chain === c.name && r.rule.family === t.family);
                    html += `
                        <div class="border border-gray-700 rounded-lg bg-gray-800/30 overflow-hidden">
                            <div class="px-4 py-3 bg-gray-800/50 border-b border-gray-700 flex justify-between items-center">
                                <div><h3 class="font-medium text-emerald-400 font-mono">Chain: ${c.name}</h3></div>
                                <span class="bg-gray-700 text-gray-300 text-xs px-2 py-1 rounded-full">${chainRules.length} rules</span>
                            </div>
                            <table class="w-full text-sm text-left">
                                <thead class="text-xs text-gray-400 uppercase bg-gray-800/50 border-b border-gray-700">
                                    <tr><th class="px-4 py-3 w-16">#</th><th class="px-4 py-3">Expression</th><th class="px-4 py-3 w-48">Activity (pkts/sec)</th><th class="px-4 py-3 w-32">Total Pkts</th><th class="px-4 py-3 w-16 text-right">Actions</th></tr>
                                </thead>
                                <tbody>
                                    ${chainRules.map(r => {
                                        const pktsObj = (r.rule.expr || []).find(e => e.counter);
                                        const pkts = pktsObj ? pktsObj.counter.packets : 0;
                                        setTimeout(() => updateSparkline(r.rule.handle, pkts), 0);
                                        return `
                                        <tr data-handle="${r.rule.handle}" class="border-b border-gray-700/50 last:border-0 hover:bg-gray-800/50 transition-colors group">
                                            <td class="px-4 py-3 text-gray-500 font-mono">${r.rule.handle}</td>
                                            <td class="px-4 py-3 font-mono text-gray-300 text-xs leading-relaxed flex flex-wrap gap-2 items-center">${formatExpr(r.rule.expr)}</td>
                                            <td class="px-4 py-3"><canvas id="chart-${r.rule.handle}" width="150" height="30"></canvas></td>
                                            <td id="pkts-${r.rule.handle}" class="px-4 py-3 font-mono text-xs text-emerald-500 font-bold">${pkts.toLocaleString()}</td>
                                            <td class="px-4 py-3 text-right"><button onclick="deleteRule('${t.family}','${t.name}','${c.name}',${r.rule.handle})" class="text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">🗑️</button></td>
                                        </tr>
                                    `}).join('')}
                                </tbody>
                            </table>
                        </div>`;
                });
                section.innerHTML = html + '</div>';
            });
        }

        // Auto-refresh every 5 seconds ONLY for active real-time data
        setInterval(() => {
            if (currentTab === 'rules' || currentTab === 'nat') {
                fetchRules();
            }
        }, 5000);

        async function fetchSets() {
            setLoading(true);
            try {
                const res = await fetch('/api/sets');
                if (!res.ok) throw new Error('Failed to fetch sets');
                const data = await res.json();
                await renderSets(data);
            } catch (err) {
                console.error("fetchSets error:", err);
            } finally {
                setLoading(false);
            }
        }

        async function renderSets(data) {
            const container = document.getElementById('sets-container');
            container.innerHTML = '';
            if (!data || !data.nftables) return;

            const sets = data.nftables.filter(item => item && item.set);
            
            // Collect all IPs safely
            const allIPs = [];
            sets.forEach(sObj => {
                const elements = sObj.set.elem || [];
                elements.forEach(el => {
                    if (typeof el === 'string' && !el.includes('/')) {
                        allIPs.push(el);
                    }
                });
            });
            
            let f2bInfo = {};
            if (allIPs.length > 0) {
                try {
                    const res = await fetch('/api/fail2ban/info', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ips: allIPs })
                    });
                    if (res.ok) f2bInfo = await res.json();
                } catch (e) { console.warn("F2B fetch failed", e); }
            }

            for (const sObj of sets) {
                const s = sObj.set;
                const section = document.createElement('div');
                section.className = 'glass rounded-xl overflow-hidden';
                
                let elementsHtml = '';
                const elements = s.elem || [];
                
                for (const el of elements) {
                    let val = 'unknown';
                    if (typeof el === 'string') val = el;
                    else if (el && el.prefix) val = `${el.prefix.addr}/${el.prefix.len}`;
                    else val = JSON.stringify(el);
                    
                    let flag = '';
                    if (typeof val === 'string' && !val.includes('/') && !val.includes('{')) {
                        try {
                            const geo = await getGeo(val);
                            if (geo) flag = `<img src="https://flagcdn.com/w20/${geo.code}.png" class="inline mr-2 w-4 h-3 shadow-sm"> <span class="text-xs text-gray-500">${geo.city}, ${geo.country}</span>`;
                        } catch(e) {}
                    }
                    
                    let banBadge = '';
                    if (f2bInfo[val]) {
                        banBadge = `<span class="bg-red-900/40 text-red-300 border border-red-500/30 px-2 py-0.5 rounded text-[10px] ml-3 uppercase font-bold tracking-wider" title="Banned at: ${f2bInfo[val].time}">🛡️ Jail: ${f2bInfo[val].jail}</span>`;
                    }
                    
                    elementsHtml += `
                        <div class="flex justify-between items-center p-3 border-b border-gray-700/50 last:border-0 hover:bg-white/5 transition-colors group">
                            <div class="font-mono flex items-center flex-wrap gap-2">
                                <span class="text-emerald-400 mr-2">•</span>
                                ${val}
                                ${banBadge}
                                <div class="ml-2">${flag}</div>
                            </div>
                            <button onclick="removeSetElement('${s.family}','${s.table}','${s.name}','${val}')" class="text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">Remove</button>
                        </div>
                    `;
                }

                section.innerHTML = `
                    <div class="bg-gray-800/80 px-6 py-4 border-b border-gray-700 flex justify-between items-center">
                        <div>
                            <h2 class="text-xl font-semibold text-white flex items-center gap-2">
                                <span class="text-xs font-mono bg-gray-700 px-2 py-1 rounded text-gray-300">${s.family}</span>
                                Set: ${s.name}
                            </h2>
                            <p class="text-xs text-gray-500 mt-1">Table: ${s.table} | Type: ${s.type}</p>
                        </div>
                        <div class="flex gap-2">
                            <input id="add-to-${s.name}" type="text" placeholder="IP or CIDR" class="bg-gray-900 border border-gray-700 rounded-md px-3 py-1 text-xs text-white focus:outline-none focus:border-emerald-500">
                            <button onclick="addSetElement('${s.family}','${s.table}','${s.name}')" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded-md text-xs transition-colors">Add</button>
                        </div>
                    </div>
                    <div class="p-2">
                        ${elementsHtml || '<p class="p-4 text-sm text-gray-500 italic">No elements in this set.</p>'}
                    </div>
                `;
                container.appendChild(section);
            }
        }

        async function addSetElement(family, table, setName) {
            const el = document.getElementById(`add-to-${setName}`).value;
            if (!el) return;
            setLoading(true);
            try {
                const res = await fetch('/api/sets/element', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ family, table, set_name: setName, element: el })
                });
                if (!res.ok) throw new Error('Failed to add element');
                showSuccess(`Added ${el} to ${setName}`);
                fetchSets();
            } catch (err) { showError(err.message); setLoading(false); }
        }

        async function removeSetElement(family, table, setName, el) {
            if (!confirm(`Remove ${el} from ${setName}?`)) return;
            setLoading(true);
            try {
                const res = await fetch('/api/sets/element', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ family, table, set_name: setName, element: el })
                });
                if (!res.ok) throw new Error('Failed to remove element');
                showSuccess(`Removed ${el} from ${setName}`);
                fetchSets();
            } catch (err) { showError(err.message); setLoading(false); }
        }

        async function deleteRule(family, table, chain, handle) {
            if (!confirm(`Delete rule #${handle}?`)) return;
            setLoading(true);
            try {
                const res = await fetch(`/api/ruleset/${family}/${table}/${chain}/${handle}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Failed to delete');
                showSuccess(`Rule ${handle} deleted`);
                fetchRules();
            } catch (err) { showError(err.message); setLoading(false); }
        }

        async function panicMode() {
            if (!confirm("⚠️ WARNING: This will flush all input rules!")) return;
            setLoading(true);
            try {
                const res = await fetch('/api/ruleset/panic', { method: 'POST' });
                if (!res.ok) throw new Error('Panic failed');
                showSuccess("Panic mode activated!");
                refreshData();
            } catch (err) { showError(err.message); setLoading(false); }
        }

        function openRuleModal() {
            document.getElementById('rule-modal').classList.remove('hidden');
        }

        function closeRuleModal() {
            document.getElementById('rule-modal').classList.add('hidden');
        }

        function toggleRateLimit() {
            const enabled = document.getElementById('rule-rate-enabled').checked;
            const settings = document.getElementById('rate-limit-settings');
            if (enabled) {
                settings.classList.remove('hidden');
            } else {
                settings.classList.add('hidden');
            }
        }

        async function submitAdvancedRule() {
            const payload = {
                family: document.getElementById('rule-family').value,
                table: "filter", // Hardcoded for now, can be expanded
                chain: document.getElementById('rule-chain').value,
                protocol: document.getElementById('rule-protocol').value,
                ports: document.getElementById('rule-ports').value,
                source: document.getElementById('rule-source').value,
                action: document.getElementById('rule-action').value,
                rate_enabled: document.getElementById('rule-rate-enabled').checked,
                rate: parseInt(document.getElementById('rule-rate').value),
                unit: document.getElementById('rule-unit').value,
                burst: parseInt(document.getElementById('rule-burst').value)
            };

            if (!payload.ports) {
                showError("Please specify at least one port.");
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/ruleset/advanced', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed to apply rule');
                
                showSuccess(data.message);
                closeRuleModal();
                fetchRules();
            } catch (err) { 
                showError(err.message); 
                setLoading(false); 
            }
        }

        function openNatModal() { document.getElementById('nat-modal').classList.remove('hidden'); }
        function closeNatModal() { document.getElementById('nat-modal').classList.add('hidden'); }

        async function submitNatRule() {
            const payload = {
                family: "ip", // Default to IPv4 for standard NAT
                table: "nat",
                chain: "PREROUTING", // Capitalized because iptables-nft creates it this way
                protocol: document.getElementById('nat-protocol').value,
                external_port: parseInt(document.getElementById('nat-ext-port').value),
                internal_ip: document.getElementById('nat-int-ip').value,
                internal_port: parseInt(document.getElementById('nat-int-port').value) || null
            };

            if (!payload.external_port || !payload.internal_ip) {
                showError("External port and Internal IP are required.");
                return;
            }

            setLoading(true);
            try {
                const res = await fetch('/api/ruleset/nat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed to apply NAT rule');
                
                showSuccess(data.message);
                closeNatModal();
                fetchRules(); // This re-renders both filter and nat tables
            } catch (err) { 
                showError(err.message); 
                setLoading(false); 
            }
        }

        async function backupRules() {
            setLoading(true);
            try {
                const res = await fetch('/api/backup', { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error('Backup failed');
                showSuccess(data.message);
            } catch (err) { showError(err.message); } finally { setLoading(false); }
        }

        function setLoading(isLoading) {
            document.getElementById('loading').classList.toggle('hidden', !isLoading);
        }

        function showError(msg) {
            document.getElementById('error-msg').textContent = msg;
            document.getElementById('error').classList.remove('hidden');
            setTimeout(() => document.getElementById('error').classList.add('hidden'), 10000);
        }

        function showSuccess(msg) {
            document.getElementById('success-msg').textContent = msg;
            document.getElementById('success').classList.remove('hidden');
            setTimeout(() => document.getElementById('success').classList.add('hidden'), 5000);
        }

        document.addEventListener('DOMContentLoaded', refreshData);
    </script>
</body>
</html>
